version: '3.3'

name: foodgram

volumes:
  pg_data:
  static:
  media:

services:
  db:
    image: postgres:18.3
    env_file:
      - ../.env
    volumes:
      - pg_data:/var/lib/postgresql
  backend:
    build: ../backend/
    env_file: ../.env
    depends_on:
      - db
    volumes:
      - static:/app/collected_static
      - media:/app/media
      - ../data:/data
  frontend:
    build: ../frontend
    volumes:
      - static:/static
  nginx:
    image: nginx:1.29.6-alpine
    depends_on:
      - frontend
      - backend
    ports:
      - 8000:80
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - static:/usr/share/nginx/html/static
      - media:/usr/share/nginx/html/media
      - ../docs/:/usr/share/nginx/html/api/docs/
